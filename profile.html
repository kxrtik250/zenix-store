<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Manage your Zenix Store profile and password.">
  <title>Profile | Zenix Store</title>
  <link rel="stylesheet" href="style.css">
  <script src="data.js" defer></script>
  <script src="app.js" defer></script>
  <script src="profile.js" defer></script>
</head>
<body data-page="profile">
  <div id="siteHeader"></div>

  <main>
    <section class="page-hero compact">
      <div class="container">
        <p class="eyebrow">Account</p>
        <h1>Your profile</h1>
        <p>Keep contact and delivery details ready for faster checkout.</p>
      </div>
    </section>

    <section class="page-section">
      <div class="container profile-grid">
        <aside class="profile-card" id="profileSummary"></aside>

        <div class="panel">
          <form id="profileForm" novalidate>
            <h2>Profile details</h2>
            <div class="form-grid">
              <div class="field">
                <label for="profileName">Full name</label>
                <input id="profileName" name="name" autocomplete="name" required>
                <span class="field-error"></span>
              </div>
              <div class="field">
                <label for="profilePhone">Phone</label>
                <input id="profilePhone" name="phone" autocomplete="tel">
                <span class="field-error"></span>
              </div>
              <div class="field full">
                <label for="profileAddress">Address</label>
                <textarea id="profileAddress" name="address" autocomplete="street-address"></textarea>
                <span class="field-error"></span>
              </div>
              <div class="field">
                <label for="profileCity">City</label>
                <input id="profileCity" name="city" autocomplete="address-level2">
                <span class="field-error"></span>
              </div>
              <div class="field">
                <label for="profilePincode">PIN code</label>
                <input id="profilePincode" name="pincode" inputmode="numeric" autocomplete="postal-code">
                <span class="field-error"></span>
              </div>
            </div>
            <div class="form-actions">
              <button class="button primary" type="submit">Save profile</button>
              <button class="button ghost" type="button" id="logoutBtn">Sign out</button>
            </div>
          </form>
        </div>

        <div></div>
        <form class="panel" id="passwordForm" novalidate>
          <h2>Change password</h2>
          <div class="form-grid">
            <div class="field">
              <label for="currentPassword">Current password</label>
              <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required>
              <span class="field-error"></span>
            </div>
            <div class="field">
              <label for="newPassword">New password</label>
              <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required>
              <span class="field-error"></span>
            </div>
          </div>
          <button class="button primary" type="submit">Update password</button>
        </form>
      </div>
    </section>
  </main>

  <div id="siteFooter"></div>
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
