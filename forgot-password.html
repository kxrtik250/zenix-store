<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Reset your Zenix Store demo account password.">
  <title>Forgot Password | Zenix Store</title>
  <link rel="stylesheet" href="style.css">
  <script src="data.js" defer></script>
  <script src="app.js" defer></script>
  <script src="auth.js" defer></script>
</head>
<body data-page="forgot-password">
  <div id="siteHeader"></div>

  <main class="auth-shell">
    <form class="panel" id="forgotForm" novalidate>
      <p class="eyebrow">Account recovery</p>
      <h1>Reset password</h1>
      <p class="panel-subtitle">Static demo reset updates the account stored in this browser.</p>
      <div class="field">
        <label for="forgotEmail">Email</label>
        <input id="forgotEmail" name="email" type="email" autocomplete="email" required>
        <span class="field-error"></span>
      </div>
      <div class="field">
        <label for="forgotPassword">New password</label>
        <input id="forgotPassword" name="password" type="password" autocomplete="new-password" required>
        <span class="field-error"></span>
      </div>
      <div class="field">
        <label for="forgotConfirm">Confirm new password</label>
        <input id="forgotConfirm" name="confirm" type="password" autocomplete="new-password" required>
        <span class="field-error"></span>
      </div>
      <button class="button primary" type="submit">Reset password</button>
      <div class="auth-links">
        <a href="login.html">Back to sign in</a>
      </div>
    </form>
  </main>

  <div id="siteFooter"></div>
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
