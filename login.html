<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sign in to your Zenix Store account.">
  <title>Sign In | Zenix Store</title>
  <link rel="stylesheet" href="style.css">
  <script src="data.js" defer></script>
  <script src="app.js" defer></script>
  <script src="auth.js" defer></script>
</head>
<body data-page="login">
  <div id="siteHeader"></div>

  <main class="auth-shell">
    <form class="panel" id="loginForm" novalidate>
      <p class="eyebrow">Welcome back</p>
      <h1>Sign in</h1>
      <p class="panel-subtitle">Access checkout, profile details, wishlist, and order history.</p>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" autocomplete="email" required>
        <span class="field-error"></span>
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
        <span class="field-error"></span>
      </div>
      <button class="button primary" type="submit">Sign in</button>
      <div class="auth-links">
        <a href="register.html">Create account</a>
        <a href="forgot-password.html">Forgot password</a>
      </div>
    </form>
  </main>

  <div id="siteFooter"></div>
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
